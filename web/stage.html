<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Rusty-Tuber Stage</title>
<style>
  html, body { margin: 0; height: 100%; background: transparent; }
  #stage-wrap {
    position: relative;
    height: 100%;
  }
  /* The avatar is a stack of same-size transparent PNGs (base, eyes, mouth).
     Each layer fills the stage and is letterboxed identically via
     object-fit:contain, so the layers align pixel-perfect. */
  .layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
</style>
</head>
<body data-mode="stage">
  <div id="stage-wrap">
    <img id="layer-eyes" class="layer" alt="" />
    <img id="layer-mouth" class="layer" alt="" />
  </div>
  <script src="app.js"></script>
</body>
</html>
