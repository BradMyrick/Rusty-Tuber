<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Rusty-Tuber Stage</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; }
  #stage-wrap { display: flex; align-items: center; justify-content: center; height: 100%; }
  #preview-video { max-width: 100%; max-height: 100%; object-fit: contain; }
  #hint { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); color: #7d8590; font: 12px system-ui; }
</style>
</head>
<body data-mode="stage">
  <div id="stage-wrap">
    <video id="preview-video" autoplay muted playsinline></video>
  </div>
  <div id="hint">OBS: add a Video Capture Device → "Rusty-Tuber" (+ Chroma Key). This page is a browser preview of that same camera.</div>
  <script>
    // Minimal: read the Rusty-Tuber virtual camera back as a normal webcam.
    (async () => {
      try {
        let s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        s.getTracks().forEach((t) => t.stop());
        const cams = (await navigator.mediaDevices.enumerateDevices()).filter((d) => d.kind === "videoinput");
        const pick = cams.find((d) => (d.label || "").includes("Rusty-Tuber")) || cams[0];
        s = await navigator.mediaDevices.getUserMedia({ video: pick ? { deviceId: { exact: pick.deviceId } } : true, audio: false });
        document.getElementById("preview-video").srcObject = s;
      } catch (e) {
        document.getElementById("hint").textContent = "Camera access failed: " + (e?.message || e);
      }
    })();
  </script>
</body>
</html>
