# Rusty-Tuber configuration. All tunables live here.
# See README.md for the layered asset layout and OBS setup.

[audio]
sample_rate = 44100      # Target sample rate (Hz). cpal negotiates; not guaranteed.
latency = "low"          # "low" (~256-frame buffers, ~6ms) | "stable" (~1024, ~23ms)
# buffer_size = 256      # Optional explicit override; omit to use the latency preset.
attack_ms = 5            # Envelope attack — mouth-open responsiveness. Smaller = snappier.
release_ms = 60         # Envelope release — mouth-close smoothness. Larger = less flutter.
mode = "input"           # "input" (mic) | "loopback" (system output via a monitor device)
device = ""              # "" = system default. Else exact name from `rusty-tuber --list-audio-devices`.

[thresholds]
# RMS level that must be exceeded to open the mouth to each level.
# Must satisfy partial < medium < open.
partial = 0.01
medium = 0.03
open = 0.15
# Optional: active mouth levels (default = all four). Lowest enabled = resting.
enabled = ["closed", "partial", "medium", "open"]

[engine]
# Resting emotion (eye-set). Empty = base/default eyes.
default_emotion = ""
asset_root = "./assets/characters/fudder"

# Emotion auto-revert timers (seconds). Empty by default (no emotion art ships).
[timers]

# Eye-blink scheduler. Optional — every key has a default.
[blink]
enabled = true
min_interval = 2.5
max_interval = 6.0
duration = 0.12
double_chance = 0.15

# Idle resting overlay (the "smile after silence" feature). After this many
# seconds of mic silence, the anim/smile/*.png overlay is composited on top of
# the avatar as its resting face; it disappears as soon as you speak. Only
# active when an anim/smile/ asset exists. 0 disables it.
[idle]
timeout_secs = 8

# Virtual webcam output (Linux v4l2loopback). The single video output: the
# composited avatar over `background` (a chroma colour or a background image).
# OBS / Zoom / Discord / the panel all read it as a normal camera. For OBS, add
# a Chroma Key filter to drop a flat chroma background; for Meet/Discord (which
# can't chroma key) use a background_image instead.
[webcam]
enabled = true
device = ""              # "/dev/videoN", or "" to auto-detect.
output_size = 512        # Square output edge (px). Layers scale to this at load;
                          # the whole pipeline runs at this size, so smaller = far
                          # less CPU. 512 is plenty for a webcam source OBS scales.
                          # Must be even when format = "yuyv".
format = "yuyv"         # "yuyv" (default; works in OBS, browsers, Cheese, Zoom,
                          # Meet, Discord — half the bandwidth of BGR4) | "bgr4"
                          # (v4l2loopback native; faster to produce but rejected
                          # by Chrome/Firefox). Use yuyv unless you have a reason.
fps = 30                 # Advertised device frame rate (VIDIOC_S_PARM) and the
                          # compositor's render-rate cap. Lets OBS / ffplay / web
                          # clients lock pacing instead of free-running (which
                          # causes the 200-700ms reader-side lag at 0 fps). 30 is
                          # the safe default; 24 for a film look, 60 for smoother
                          # motion at higher CPU.
steady = true           # Constant-fps output even when idle (default on). REQUIRED
                          # for OBS: an event-driven writer that parks during
                          # silence makes OBS stall then backlog up to ~1s when you
                          # resume talking (intermittent lag, worst on start/stop).
                          # Costs ~1-2% CPU at 512². Set false only for WebRTC-only
                          # setups (Discord/Meet) that prefer zero idle CPU.
background = "#FF00FF"  # #rrggbb chroma fill used when no background_image is set
                          # (webcams carry no alpha). Add a Chroma Key filter in OBS
                          # to drop it. Ignored while background_image is set.
background_image = ""  #"assets/backgrounds/background1.png"    # Optional background image composited behind the avatar
                          # (overrides the flat chroma `background`). A path
                          # relative to the working dir, e.g.
                          # "assets/backgrounds/background1.png". Use this for
                          # apps that don't chroma key (Google Meet / Discord use
                          # segmentation, so a flat green shows through). "" = use
                          # the solid `background` colour (the OBS chroma-key path).
