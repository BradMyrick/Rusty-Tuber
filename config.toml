# Rusty-Tuber configuration. All tunables live here.
# See README.md for the layered asset layout and OBS setup.

[audio]
sample_rate = 44100      # Target sample rate (Hz). cpal negotiates; not guaranteed.
latency = "low"          # "low" (~256-frame buffers, ~6ms) | "stable" (~1024, ~23ms)
# buffer_size = 256      # Optional explicit override; omit to use the latency preset.
attack_ms = 6            # Envelope attack — mouth-open responsiveness. Smaller = snappier.
release_ms = 110         # Envelope release — mouth-close smoothness. Larger = less flutter.
mode = "input"           # "input" (mic) | "loopback" (system output via a monitor device)
device = ""              # "" = system default. Else exact name from `rusty-tuber --list-audio-devices`.

[thresholds]
# RMS level that must be exceeded to open the mouth to each level.
# Must satisfy partial < medium < open.
partial = 0.02
medium = 0.08
open = 0.18
# Optional: active mouth levels (default = all four). Lowest enabled = resting.
enabled = ["closed", "partial", "medium", "open"]

[engine]
# Resting emotion (eye-set). Empty = base/default eyes.
default_emotion = ""
asset_root = "./assets/characters/default_macaw"
bind = "127.0.0.1:8080"

# Emotion auto-revert timers (seconds). Empty by default (no emotion art ships).
[timers]

# Eye-blink scheduler. Optional — every key has a default.
[blink]
enabled = true
min_interval = 2.5
max_interval = 6.0
duration = 0.12
double_chance = 0.15

# Virtual webcam output (Linux v4l2loopback). The single video output: the
# composited avatar over `background` (BGR4). OBS / Zoom / Discord / the panel
# all read it as a normal camera; add a Chroma Key filter to drop the background.
[webcam]
enabled = true
device = ""              # "/dev/videoN", or "" to auto-detect.
fps = 30                 # Active frame rate while the avatar is moving.
idle_fps = 8            # Idle frame rate while static (saves CPU).
background = "#00ff00"  # #rrggbb chroma fill (webcams carry no alpha).
