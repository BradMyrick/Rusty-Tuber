name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: fmt + clippy + test (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # cpal's ALSA backend needs the ALSA development headers at build time.
      # ubuntu-latest ships the runtime lib but NOT libasound2-dev, so without
      # this step `cargo build` fails in CI (while working on a dev machine that
      # has the -dev package installed).
      - name: Install system dependencies (ALSA)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-targets --all-features
