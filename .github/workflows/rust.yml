name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly supply-chain audit (advisories + licenses), Sunday 09:00 UTC.
    - cron: "0 9 * * 0"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: fmt + clippy + test (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # cpal's ALSA backend needs the ALSA development headers at build time.
      # ubuntu-latest ships the runtime lib but NOT libasound2-dev, so without
      # this step `cargo build` fails in CI (while working on a dev machine that
      # has the -dev package installed).
      - name: Install system dependencies (ALSA)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-targets --all-features

  # Supply-chain security: RUSTSEC advisories, banned crates, and license
  # policy. Runs on PRs/pushes that touch the lockfile, plus the weekly
  # schedule above so new advisories are caught even without activity.
  audit:
    name: cargo-deny (advisories + licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --all-features check advisories bans licenses sources
          command: check
